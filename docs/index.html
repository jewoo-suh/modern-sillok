<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>.sillok — A Korean-Specific Lossless Text Encoding Format</title>
  <meta name="description" content="A lossless, recoverable encoding for Korean text. Paper by Jewoo Suh.">
  <style>
    html, body { margin: 0; height: 100%; background: #525659; }
    object, iframe { border: 0; width: 100%; height: 100%; display: block; }
    .fallback { color: #eee; font-family: system-ui, sans-serif; padding: 2rem; }
  </style>
</head>
<body>
  <object data="sillok_paper.pdf" type="application/pdf">
    <iframe src="sillok_paper.pdf">
      <div class="fallback">
        Your browser cannot display the embedded PDF.
        <a href="sillok_paper.pdf" style="color:#9cf">Open the paper directly</a>.
      </div>
    </iframe>
  </object>
</body>
</html>
